name: Build Vocald APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:

      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Cache
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('app/buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      # 4. System deps (no GStreamer - broken on ubuntu-22.04)
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev libsqlite3-dev \
            libjpeg-dev libpng-dev libtiff-dev \
            build-essential ccache

      # 5. Java
      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      # 6. Python build tools
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0
          pip install cython==0.29.37
          pip install virtualenv

      # 7. Strip BOM from buildozer.spec (Windows VS Code saves with BOM)
      - name: Fix buildozer.spec encoding
        run: |
          sed -i 's/^\xef\xbb\xbf//' app/buildozer.spec
          echo "First line check:"
          head -1 app/buildozer.spec

      # 8. Build APK
      - name: Build Debug APK
        working-directory: app
        run: |
          buildozer -v android debug 2>&1 | tee build.log || true

      # 9. Locate APK
      - name: Locate APK
        working-directory: app
        run: |
          echo "=== Searching for APK ==="
          APK_PATH=$(find . -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found. Last 100 lines of build log:"
            tail -100 build.log || echo "No build log"
            exit 1
          fi
          APK_PATH="${APK_PATH#./}"
          echo "APK_PATH=app/$APK_PATH" >> $GITHUB_ENV
          echo "APK_NAME=$(basename $APK_PATH)" >> $GITHUB_ENV
          echo "Found: app/$APK_PATH"
          ls -lh "$APK_PATH"

      # 10. Upload artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vocald-debug-apk
          path: ${{ env.APK_PATH }}
          retention-days: 30

      # 11. Release
      - name: Generate release info
        run: |
          echo "SHA7=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "RELEASE_TAG=build-$(date +'%Y%m%d-%H%M')-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Vocald Build ${{ env.RELEASE_TAG }}"
          body: |
            ## Vocald Debug Build
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **By:** ${{ github.actor }}

            ### Install
            1. Download the `.apk` below
            2. Enable Install from unknown sources on your Android device
            3. Install and test

            ### Changes
            ${{ github.event.head_commit.message }}

            > Debug build for testing only
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 12. Always upload build log
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: app/build.log
          retention-days: 7